services:
  master:
    image: tcimba/hadoop-cluster:latest
    container_name: hadoop-master
    hostname: hadoop-master
    stdin_open: true
    tty: true
    volumes:
      - type: volume
        source: home
        target: /home
      - type: volume
        source: hdfs-data
        target: /usr/local/hadoop/hdfs/data
      - type: volume
        source: logs
        target: /usr/local/hadoop/logs
#      - type: bind
#        source: ${CONFIG_FOLDER}/workers
#        target: /usr/local/hadoop/etc/hadoop/workers
    ports:
      - "9870:9870"
      - "8088:8088"
      - "19888:19888"
      - "2222:22"
    networks:
      - hadoop-net
    command: ${WORKER_NUMBER} 0
networks:
  hadoop-net:
    name: hadoop-net
    external: true
volumes:
  home:
  hdfs-data:
  logs:
